openapi: 3.0.3
info:
  title: SkyBooker Uçuş Rezervasyon API
  version: 1.0.0
  description: >
    Bu API, SkyBooker uçuş rezervasyon sistemi için tasarlanmış bir RESTful servistir.
    Kullanıcı yönetimi, uçuş seferleri ve biletleme işlemlerini kapsar.
    JWT tabanlı kimlik doğrulama ile korunmaktadır.
  contact:
    name: Nuri Eren Lodi (AntSoft)
    email: eren@skybooker.local

servers:
  - url: http://localhost:5001/api
    description: Yerel Geliştirme Sunucusu (Development)
  - url: https://api.skybooker.com/v1
    description: Canlı Sunucu (Production)

tags:
  - name: Auth
    description: Kullanıcı giriş ve yetkilendirme işlemleri
  - name: Users
    description: Kullanıcı profili yönetimi
  - name: Flights
    description: Uçuş seferleri, arama ve yönetim işlemleri
  - name: Reservations
    description: Bilet rezervasyon ve iptal işlemleri

security:
  - BearerAuth: []

paths:
  /auth/login:
    post:
      tags:
        - Auth
      summary: Kullanıcı Girişi ve Token Alma
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInput'
      responses:
        "200":
          description: Başarılı giriş, Token döndürüldü
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        "401":
          description: Hatalı e-posta veya şifre
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/register:
    post:
      tags:
        - Users
      summary: Yeni Kullanıcı Kaydı Oluşturma
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterInput'
      responses:
        "201":
          description: Kullanıcı başarıyla oluşturuldu
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        "400":
          description: Geçersiz istek verisi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: Kullanıcı ID
    put:
      tags:
        - Users
      summary: Kullanıcı Profilini Güncelleme
      operationId: updateUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserInput'
      responses:
        "200":
          description: Profil güncellendi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        "404":
          description: Kullanıcı bulunamadı
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags:
        - Users
      summary: Kullanıcı Hesabını Silme
      operationId: deleteUser
      responses:
        "204":
          description: Hesap başarıyla silindi (No Content)
        "404":
          description: Kullanıcı bulunamadı
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /flights:
    get:
      tags:
        - Flights
      summary: Uçuşları Arama
      operationId: searchFlights
      parameters:
        - name: departure
          in: query
          required: false
          schema:
            type: string
          description: Kalkış Havalimanı Kodu (Örn: AYT)
        - name: arrival
          in: query
          required: false
          schema:
            type: string
          description: Varış Havalimanı Kodu (Örn: IST)
        - name: date
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Uçuş Tarihi
      responses:
        "200":
          description: Uçuş listesi başarıyla getirildi
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Flight'
    post:
      tags:
        - Flights
      summary: Yeni Uçuş Seferi Ekleme (Admin)
      operationId: createFlight
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FlightInput'
      responses:
        "201":
          description: Uçuş seferi oluşturuldu
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Flight'
        "400":
          description: Hatalı veri
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /flights/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    put:
      tags:
        - Flights
      summary: Uçuş Bilgilerini Güncelleme
      operationId: updateFlight
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FlightInput'
      responses:
        "200":
          description: Uçuş güncellendi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Flight'
    delete:
      tags:
        - Flights
      summary: Uçuş Seferini İptal Etme
      operationId: deleteFlight
      responses:
        "204":
          description: Uçuş silindi

  /reservations:
    post:
      tags:
        - Reservations
      summary: Bilet Rezervasyonu Oluşturma
      operationId: createReservation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReservationInput'
      responses:
        "201":
          description: Rezervasyon oluşturuldu
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reservation'
        "400":
          description: Koltuk dolu veya geçersiz uçuş
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /reservations/my-reservations:
    get:
      tags:
        - Reservations
      summary: Geçmiş Rezervasyonları Görüntüleme
      operationId: listMyReservations
      responses:
        "200":
          description: Kullanıcının rezervasyonları listelendi
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Reservation'

  /reservations/{id}:
    delete:
      tags:
        - Reservations
      summary: Rezervasyon İptali
      operationId: cancelReservation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Rezervasyon iptal edildi
        "404":
          description: Rezervasyon bulunamadı
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # --- Ortak Hata Modeli (Hocanın Örneğindeki Gibi) ---
    Error:
      type: object
      properties:
        message:
          type: string
          example: "Aradığınız kayıt bulunamadı."
        code:
          type: integer
          example: 404

    # --- Auth Modelleri ---
    LoginInput:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: yolcu@skybooker.com
        password:
          type: string
          minLength: 6
          example: "123456"

    AuthResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT Token
        expiresIn:
          type: integer
          description: Token geçerlilik süresi (saniye)

    # --- User Modelleri ---
    RegisterInput:
      type: object
      required:
        - firstName
        - lastName
        - email
        - password
      properties:
        firstName:
          type: string
          minLength: 2
          example: Eren
        lastName:
          type: string
          minLength: 2
          example: Lodi
        email:
          type: string
          format: email
          example: eren@skybooker.com
        password:
          type: string
          minLength: 6
          example: "GucluSifre123!"

    UserInput:
      type: object
      properties:
        firstName:
          type: string
          minLength: 2
        lastName:
          type: string
          minLength: 2
        phone:
          type: string
          example: "+905551234567"

    User:
      type: object
      properties:
        id:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string

    # --- Flight Modelleri ---
    FlightInput:
      type: object
      required:
        - flightCode
        - departure
        - arrival
        - price
        - departureTime
      properties:
        flightCode:
          type: string
          example: "XQ912"
        departure:
          type: string
          example: "AYT"
          description: Kalkış Havalimanı Kodu
        arrival:
          type: string
          example: "ADB"
          description: Varış Havalimanı Kodu
        price:
          type: number
          format: double
          minimum: 0
          example: 1250.50
        departureTime:
          type: string
          format: date-time

    Flight:
      allOf:
        - $ref: '#/components/schemas/FlightInput'
        - type: object
          properties:
            id:
              type: integer
              example: 101

    # --- Reservation Modelleri ---
    ReservationInput:
      type: object
      required:
        - flightId
        - seatNumber
      properties:
        flightId:
          type: integer
          example: 101
        seatNumber:
          type: string
          example: "12A"
        passengerName:
          type: string
          example: "Eren Lodi"

    Reservation:
      type: object
      properties:
        id:
          type: integer
          example: 505
        flightCode:
          type: string
          example: "XQ912"
        seatNumber:
          type: string
        reservationDate:
          type: string
          format: date-time
        status:
          type: string
          enum: [Confirmed, Cancelled]
          example: Confirmed